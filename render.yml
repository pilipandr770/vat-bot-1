services:
  # Web Service
  - type: web
    name: vat-verifizierung
    runtime: python3
    region: frankfurt
    plan: free
    branch: main
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      # ── System security tools for NIS2 site audit ──────────────────────
      apt-get install -y --no-install-recommends nmap nikto dnsutils 2>/dev/null || true
      # ── Go runtime ─────────────────────────────────────────────────────
      if [ ! -d /usr/local/go ]; then
        wget -q https://go.dev/dl/go1.22.4.linux-amd64.tar.gz -O /tmp/go.tar.gz
        tar -C /usr/local -xzf /tmp/go.tar.gz && rm /tmp/go.tar.gz
      fi
      export PATH=$PATH:/usr/local/go/bin:$HOME/go/bin
      # ── Go-based security tools ─────────────────────────────────────────
      go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest   2>/dev/null || true
      go install github.com/projectdiscovery/httpx/cmd/httpx@latest        2>/dev/null || true
      go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest 2>/dev/null || true
      # Copy Go binaries to a system-wide path so they're found at runtime
      cp $HOME/go/bin/* /usr/local/bin/ 2>/dev/null || true
    preDeployCommand: flask db upgrade
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DB_SCHEMA
        value: vat_verification_claude
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_BASIC
        sync: false
      - key: STRIPE_PRICE_PROFESSIONAL
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: MS_CLIENT_ID
        sync: false
      - key: MS_CLIENT_SECRET
        sync: false
      - key: MS_TENANT_ID
        value: common
      - key: MAILGUARD_ENCRYPTION_KEY
        generateValue: true
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: GOOGLE_SAFE_BROWSING_API_KEY
        sync: false
      - key: FILE_SCANNER_URL
        sync: false
      - key: HANDELSREGISTER_API_KEY
        sync: false
      - key: OPENCORPORATES_API_KEY
        sync: false
      - key: EPO_OPS_CONSUMER_KEY
        sync: false
      - key: EPO_OPS_CONSUMER_SECRET
        sync: false
      - key: LINKEDIN_EMAIL
        sync: false
      - key: LINKEDIN_PASSWORD
        sync: false
      - key: LINKEDIN_ORGANIZATION_ID
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_ACCESS_TOKEN
        sync: false

  # Daily Blog Generator Cron Job
  - type: cron
    name: daily-blog-generator
    runtime: python3
    region: frankfurt
    plan: free
    branch: main
    schedule: "0 7 * * *"
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python scripts/generate_blog.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DB_SCHEMA
        value: vat_verification_claude
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MAILGUARD_ENCRYPTION_KEY
        generateValue: true

# Note: Schema must exist before first deploy.
# Run once via Render shell: CREATE SCHEMA IF NOT EXISTS vat_verification_claude;
