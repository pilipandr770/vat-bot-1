name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Bandit security scan
        run: bandit -r . -x ./migrations,./tests,./scripts --severity-level medium -q

      - name: pip-audit (CVE check)
        run: |
          pip install pip-audit
          pip-audit --require-hashes --disable-pip 2>/dev/null || pip-audit

  tests:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: vat_bot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      FLASK_ENV: testing
      DATABASE_URL: postgresql://test:test@localhost:5432/vat_bot_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      MAILGUARD_ENCRYPTION_KEY: ""
      WTF_CSRF_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run database migrations
        run: flask db upgrade
        env:
          FLASK_APP: wsgi.py

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
