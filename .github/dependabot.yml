version: 2
updates:
  # Python dependencies — managed manually via requirements.in + pip-compile.
  # Dependabot PRs are disabled (limit=0); security alerts still appear in the
  # Security tab. Re-enable by raising open-pull-requests-limit when needed.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 0

  # GitHub Actions — keep auto-updating action versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
